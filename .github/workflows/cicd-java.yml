name: CI/CD - Sistema de Prestamos

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar el proyecto
        run: mvn compile

      - name: Ejecutar pruebas unitarias
        run: mvn test

  cd:
    name: CD - Generar y Publicar JAR
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar archivo .jar
        run: mvn package -DskipTests

      - name: Publicar sistema-prestamos.jar como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: sistema-prestamos
          path: target/sistema-prestamos.jar
